name: CI - Seed & Serve

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build